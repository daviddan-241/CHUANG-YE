services:
  - type: web
    name: dave-social-ai
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: singapore         # Closest free region to Shanghai
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: TZ
        value: Asia/Shanghai
      - key: DATABASE_URL
        value: file:./data/prod.db
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: TELEGRAM_API_ID
        sync: false
      - key: TELEGRAM_API_HASH
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: COMFYUI_API_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: BRAND_A_NAME
        value: ChuangYe
      - key: BRAND_B_NAME
        value: VelocityEdge
    disk:
      name: dave-data
      mountPath: /app/data
      sizeGB: 1
